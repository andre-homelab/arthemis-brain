name: Merge Main PR On Success

on:
  workflow_run:
    workflows:
      - Main PR Quality
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Merge promoted PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];

            if (prs.length === 0) {
              core.info('Nenhum PR associado a este workflow_run.');
              return;
            }

            const prRef = prs[0];
            const { owner, repo } = context.repo;
            const pr = (
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prRef.number,
              })
            ).data;

            if (pr.base.ref !== 'main') {
              core.info(`PR #${pr.number} nao aponta para main.`);
              return;
            }

            if (pr.head.ref !== 'dev') {
              core.info(`PR #${pr.number} nao vem da branch dev.`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: 'merge',
            });
